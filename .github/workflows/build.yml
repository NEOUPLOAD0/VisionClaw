name: build-apk
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}
      - name: Configure secrets
        run: |
          cd samples/CameraAccessAndroid
          sed -i '/org.gradle.java.home/d' gradle.properties || true
          echo "github_token=${{ secrets.META_SDK_TOKEN }}" >> local.properties
          F=app/src/main/java/com/meta/wearable/dat/externalsampleapps/cameraaccess/Secrets.kt
          printf '%s\n' \
            'package com.meta.wearable.dat.externalsampleapps.cameraaccess' \
            '' \
            'object Secrets {' \
            '    const val geminiAPIKey: String = "__GEMINI__"' \
            '    const val openClawHost: String = ""' \
            '    const val openClawPort: Int = 0' \
            '    const val openClawHookToken: String = ""' \
            '    const val openClawGatewayToken: String = ""' \
            '    const val webrtcSignalingURL: String = ""' \
            '    const val pavlokToken: String = "__PAVLOK__"' \
            '}' > "$F"
          sed -i "s|__GEMINI__|${{ secrets.GEMINI_KEY }}|" "$F"
          sed -i "s|__PAVLOK__|${{ secrets.PAVLOK_TOKEN }}|" "$F"
      - name: Build
        run: cd samples/CameraAccessAndroid && chmod +x gradlew && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with: {name: apk, path: samples/CameraAccessAndroid/**/build/outputs/apk/debug/*.apk}
